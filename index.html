<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)">
<title>Obab SOP</title>
<script>
(function() {
  try {
    var saved = localStorage.getItem('obab-sop-theme');
    if (saved === 'dark' || saved === 'light') {
      document.documentElement.setAttribute('data-theme', saved);
    }
  } catch (e) {}
})();
</script>
<style>
:root {
  --bg: #f8fafc; --card: #fff; --border: #e2e8f0;
  --primary: #2563eb; --primary-light: #dbeafe; --primary-dark: #1d4ed8;
  --text: #1e293b; --text-muted: #64748b; --text-light: #94a3b8;
  --chip-bg: #f1f5f9; --chip-text: #64748b;
  --ref-bg: #f8fafc; --progress-bg: #e2e8f0;
  --tag-chef: #dc2626; --tag-ceo: #7c3aed;
  --tag-admin: #2563eb; --tag-lead_manager: #0d9488;
  --tag-manager: #059669; --tag-part: #d97706; --tag-kitchen: #be185d;
  --tag-btn-border: #fbbf24; --tag-btn-text: #92400e; --tag-btn-hover: #f59e0b;
  --check-bg: #eff6ff; --check-border: #93c5fd;
  --danger: #ef4444;
  --shadow: rgba(0,0,0,.15); --shadow-card: rgba(0,0,0,.06);
  --header-tab-bg: rgba(255,255,255,0.15); --header-tab-text: rgba(255,255,255,0.85);
  color-scheme: light;
}
html[data-theme="dark"] {
  --bg: #0b1220; --card: #111a2e; --border: #1f2a44;
  --primary: #60a5fa; --primary-light: #1e3a8a; --primary-dark: #3b82f6;
  --text: #e5ecf5; --text-muted: #94a3b8; --text-light: #64748b;
  --chip-bg: #1b2640; --chip-text: #94a3b8;
  --ref-bg: #0f1830; --progress-bg: #1f2a44;
  --tag-chef: #f87171; --tag-ceo: #a78bfa;
  --tag-admin: #60a5fa; --tag-lead_manager: #2dd4bf;
  --tag-manager: #34d399; --tag-part: #fbbf24; --tag-kitchen: #f472b6;
  --tag-btn-border: #b45309; --tag-btn-text: #fbbf24; --tag-btn-hover: #d97706;
  --check-bg: #14254a; --check-border: #2563eb;
  --danger: #f87171;
  --shadow: rgba(0,0,0,.5); --shadow-card: rgba(0,0,0,.25);
  --header-tab-bg: rgba(255,255,255,0.10); --header-tab-text: rgba(255,255,255,0.85);
  color-scheme: dark;
}
@media (prefers-color-scheme: dark) {
  html:not([data-theme]) {
    --bg: #0b1220; --card: #111a2e; --border: #1f2a44;
    --primary: #60a5fa; --primary-light: #1e3a8a; --primary-dark: #3b82f6;
    --text: #e5ecf5; --text-muted: #94a3b8; --text-light: #64748b;
    --chip-bg: #1b2640; --chip-text: #94a3b8;
    --ref-bg: #0f1830; --progress-bg: #1f2a44;
    --tag-chef: #f87171; --tag-ceo: #a78bfa;
    --tag-admin: #60a5fa; --tag-lead_manager: #2dd4bf;
    --tag-manager: #34d399; --tag-part: #fbbf24; --tag-kitchen: #f472b6;
    --tag-btn-border: #b45309; --tag-btn-text: #fbbf24; --tag-btn-hover: #d97706;
    --check-bg: #14254a; --check-border: #2563eb;
    --danger: #f87171;
    --shadow: rgba(0,0,0,.5); --shadow-card: rgba(0,0,0,.25);
    --header-tab-bg: rgba(255,255,255,0.10); --header-tab-text: rgba(255,255,255,0.85);
    color-scheme: dark;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       background: var(--bg); color: var(--text); line-height: 1.5;
       -webkit-font-smoothing: antialiased; min-height: 100vh; }

/* ── Header ── */
header { background: var(--primary); color: #fff; padding: 14px 0; position: sticky; top: 0; z-index: 100;
         box-shadow: 0 2px 8px var(--shadow); }
header .container { max-width: 800px; margin: 0 auto; padding: 0 16px; }
.header-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
header h1 { font-size: 1.2rem; font-weight: 700; }
.header-right { display: flex; align-items: center; gap: 10px; }
.header-meta { font-size: 0.75rem; opacity: 0.7; }
.theme-toggle { background: rgba(255,255,255,0.25); color: #fff;
                border: 1.5px solid rgba(255,255,255,0.55);
                width: 36px; height: 36px; min-width: 36px; border-radius: 50%; cursor: pointer;
                font-size: 1.05rem; line-height: 1; padding: 0;
                display: inline-flex; align-items: center; justify-content: center;
                transition: background .2s, transform .2s, border-color .2s; }
.theme-toggle:hover { background: rgba(255,255,255,0.4); border-color: #fff; transform: scale(1.05); }
.theme-toggle:active { transform: scale(0.95); }

/* ── Mode tabs ── */
.mode-tabs { display: flex; gap: 4px; margin-top: 10px; }
.mode-tab { flex: 1; padding: 8px; text-align: center; border-radius: 8px;
            font-size: 0.85rem; font-weight: 600; cursor: pointer;
            background: var(--header-tab-bg); color: var(--header-tab-text);
            border: none; transition: all .2s; }
.mode-tab.active { background: #fff; color: var(--primary); }

/* ── Container ── */
.container { max-width: 800px; margin: 0 auto; padding: 16px; }
.page { display: none; }
.page.active { display: block; }

/* ── Shared: filters, search ── */
.search-box { position: relative; margin-bottom: 16px; }
#search { width: 100%; padding: 12px 16px 12px 40px; font-size: 0.95rem;
           border: 2px solid var(--border); border-radius: 10px; outline: none;
           transition: border-color .2s; background: var(--card); }
#search:focus { border-color: var(--primary); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
               color: var(--text-light); font-size: 1.1rem; }
.search-hint { font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; }
.filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.filter-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px;
              background: var(--card); cursor: pointer; font-size: 0.8rem;
              transition: all .15s; color: var(--text); }
.filter-btn:hover { border-color: var(--primary); }
.filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.tag-btn { border-color: var(--tag-btn-border); color: var(--tag-btn-text); }
.tag-btn:hover, .tag-btn.active { background: var(--tag-btn-hover); color: #fff; border-color: var(--tag-btn-hover); }

/* ── Stats ── */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
         gap: 8px; margin-bottom: 20px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
             padding: 10px; text-align: center; }
.stat-card .num { font-size: 1.3rem; font-weight: 700; color: var(--primary); }
.stat-card .label { font-size: 0.7rem; color: var(--text-muted); }

/* ── Wiki task cards ── */
.task-list { display: flex; flex-direction: column; gap: 6px; }
.cat-header { font-size: 1rem; font-weight: 700; margin: 16px 0 6px;
              padding: 8px 12px; background: var(--primary-light); border-radius: 6px; }
.sub-header { font-size: 0.85rem; font-weight: 600; color: var(--text-muted);
              margin: 10px 0 4px; padding-left: 10px; border-left: 3px solid var(--primary); }
.task-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
             padding: 12px; cursor: pointer; transition: box-shadow .15s; }
.task-card:hover { box-shadow: 0 2px 8px var(--shadow-card); }
.task-card.expanded .task-detail { display: block; }
.task-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; }
.task-id { font-family: monospace; font-size: 0.7rem; color: var(--chip-text);
           background: var(--chip-bg); padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
.task-name { font-weight: 600; flex: 1; font-size: 0.9rem; }
.task-cycle { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }
.task-roles { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.role-tag { font-size: 0.65rem; padding: 2px 8px; border-radius: 12px; color: #fff; font-weight: 600; }
.role-tag.chef { background: var(--tag-chef); }
.role-tag.ceo { background: var(--tag-ceo); }
.role-tag.admin { background: var(--tag-admin); }
.role-tag.lead_manager { background: var(--tag-lead_manager); }
.role-tag.manager { background: var(--tag-manager); }
.role-tag.part { background: var(--tag-part); }
.role-tag.kitchen { background: var(--tag-kitchen); }
.task-detail { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.task-detail h4 { font-size: 0.8rem; color: var(--text-muted); margin: 6px 0 3px; }
.task-detail p { font-size: 0.85rem; white-space: pre-wrap; }
.task-detail .ref { background: var(--ref-bg); padding: 8px; border-radius: 6px;
                    font-size: 0.8rem; color: var(--text-muted); }
.task-detail .staff-name { display: inline-block; background: var(--chip-bg); padding: 2px 6px;
                           border-radius: 4px; font-size: 0.75rem; margin: 2px; color: var(--text); }
.result-count { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; }
.no-results { text-align: center; padding: 40px; color: var(--text-muted); }

/* ══════════════════════════════════════════
   CHECKLIST MODE
   ══════════════════════════════════════════ */
.cl-header { margin-bottom: 16px; }
.cl-date { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; text-align: center; }
.cl-date .weekday { color: var(--primary); }
.cl-role-selector { display: flex; gap: 0; border-radius: 10px; overflow: hidden;
                    border: 2px solid var(--primary); }
.cl-role-btn { flex: 1; padding: 10px; text-align: center; font-size: 0.9rem; font-weight: 700;
               cursor: pointer; border: none; background: var(--card); color: var(--primary);
               transition: all .15s; }
.cl-role-btn.active { background: var(--primary); color: #fff; }
.cl-role-btn + .cl-role-btn { border-left: 2px solid var(--primary); }

.cl-cycle-bar { display: flex; gap: 6px; margin-bottom: 16px; }
.cl-cycle-btn { padding: 5px 12px; border-radius: 16px; font-size: 0.8rem; font-weight: 500;
                border: 1px solid var(--border); background: var(--card); cursor: pointer;
                transition: all .15s; }
.cl-cycle-btn.active { background: var(--primary-dark); color: #fff; border-color: var(--primary-dark); }

.cl-progress { margin-bottom: 20px; }
.cl-progress-text { display: flex; justify-content: space-between; align-items: baseline;
                    margin-bottom: 6px; }
.cl-progress-text .done { font-size: 1.4rem; font-weight: 800; color: var(--primary); }
.cl-progress-text .total { font-size: 0.85rem; color: var(--text-muted); }
.cl-progress-bar { height: 8px; background: var(--progress-bg); border-radius: 4px; overflow: hidden; }
.cl-progress-fill { height: 100%; background: var(--primary); border-radius: 4px;
                    transition: width .3s ease; }

.cl-section { margin-bottom: 20px; }
.cl-section-title { font-size: 0.85rem; font-weight: 700; color: var(--text-muted);
                    padding: 6px 0; margin-bottom: 6px;
                    border-bottom: 2px solid var(--primary-light); }
.cl-item { display: flex; align-items: flex-start; gap: 12px;
           background: var(--card); border: 1.5px solid var(--border); border-radius: 10px;
           padding: 14px; margin-bottom: 6px; transition: all .2s;
           -webkit-user-select: none; user-select: none; }
.cl-item.checked { background: var(--check-bg); border-color: var(--check-border); opacity: 0.7; }
.cl-item.checked .cl-item-name { text-decoration: line-through; color: var(--text-muted); }

.cl-checkbox { width: 26px; height: 26px; min-width: 26px; border-radius: 50%;
               border: 2.5px solid var(--border); display: flex; align-items: center;
               justify-content: center; cursor: pointer; transition: all .15s;
               margin-top: 1px; }
.cl-item.checked .cl-checkbox { background: var(--primary); border-color: var(--primary); }
.cl-checkbox::after { content: ''; display: none; width: 8px; height: 14px;
                      border: solid #fff; border-width: 0 2.5px 2.5px 0;
                      transform: rotate(45deg) translate(-1px, -1px); }
.cl-item.checked .cl-checkbox::after { display: block; }

.cl-item-body { flex: 1; min-width: 0; }
.cl-item-top { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
.cl-item-name { font-size: 0.9rem; font-weight: 600; }
.cl-item-id { font-family: monospace; font-size: 0.65rem; color: var(--text-light);
              background: var(--chip-bg); padding: 1px 5px; border-radius: 3px; }
.cl-item-detail { display: none; margin-top: 8px; padding-top: 8px;
                  border-top: 1px dashed var(--border); }
.cl-item-detail.open { display: block; }
.cl-item-detail p { font-size: 0.8rem; white-space: pre-wrap; color: var(--text-muted); line-height: 1.6; }
.cl-expand-btn { display: inline-block; margin-top: 4px; font-size: 0.75rem;
                 color: var(--primary); cursor: pointer; font-weight: 500; }

.cl-footer { text-align: center; padding: 20px 0 40px; }
.cl-reset-btn { padding: 10px 24px; border: 2px solid var(--danger); border-radius: 8px;
                background: transparent; color: var(--danger); font-size: 0.85rem;
                font-weight: 600; cursor: pointer; transition: all .15s; }
.cl-reset-btn:hover { background: var(--danger); color: #fff; }

.cl-complete { display: none; text-align: center; padding: 40px 20px; }
.cl-complete.show { display: block; }
.cl-complete .icon { font-size: 3rem; margin-bottom: 8px; }
.cl-complete .msg { font-size: 1.1rem; font-weight: 700; color: var(--primary); }

/* ── Name input ── */
.cl-name-bar { display: flex; gap: 8px; margin-bottom: 14px; }
.cl-name-input { flex: 1; padding: 10px 14px; border: 2px solid var(--border); border-radius: 10px;
                 font-size: 0.9rem; background: var(--card); color: var(--text); outline: none;
                 transition: border-color .2s; }
.cl-name-input:focus { border-color: var(--primary); }
.cl-name-input::placeholder { color: var(--text-light); }

/* ── Submit button ── */
.cl-submit-btn { padding: 14px 24px; border: none; border-radius: 10px;
                 background: var(--primary); color: #fff; font-size: 0.95rem;
                 font-weight: 700; cursor: pointer; transition: all .15s; width: 100%;
                 margin-bottom: 12px; }
.cl-submit-btn:hover { background: var(--primary-dark); }
.cl-submit-btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

/* ── Submitted banner ── */
.cl-submitted { background: var(--check-bg); border: 2px solid var(--check-border);
                border-radius: 10px; padding: 16px; text-align: center; margin-bottom: 16px; }
.cl-submitted .icon { font-size: 1.5rem; margin-bottom: 4px; }
.cl-submitted .msg { font-size: 0.9rem; font-weight: 600; color: var(--primary); }
.cl-submitted .time { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

/* ── Share button ── */
.cl-share-btn { padding: 10px 20px; border: 2px solid var(--primary); border-radius: 8px;
                background: transparent; color: var(--primary); font-size: 0.85rem;
                font-weight: 600; cursor: pointer; transition: all .15s; }
.cl-share-btn:hover { background: var(--primary); color: #fff; }

/* ══ HISTORY PAGE ══ */
.hist-empty { text-align: center; padding: 40px; color: var(--text-muted); }
.hist-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
             padding: 14px; margin-bottom: 8px; }
.hist-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.hist-date { font-weight: 700; font-size: 0.95rem; }
.hist-role { font-size: 0.7rem; padding: 3px 10px; border-radius: 12px; color: #fff; font-weight: 600; }
.hist-role.lead_manager { background: var(--tag-lead_manager); }
.hist-role.manager { background: var(--tag-manager); }
.hist-meta { display: flex; justify-content: space-between; align-items: center;
             font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; }
.hist-progress { height: 6px; background: var(--progress-bg); border-radius: 3px; overflow: hidden;
                 margin-bottom: 6px; }
.hist-progress-fill { height: 100%; background: var(--primary); border-radius: 3px; }
.hist-tasks { font-size: 0.78rem; color: var(--text-muted); }
.hist-tasks .done { color: var(--primary); }
.hist-tasks .missed { color: var(--danger); }
.hist-delete { background: none; border: none; color: var(--text-light); cursor: pointer;
               font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; }
.hist-delete:hover { color: var(--danger); background: var(--chip-bg); }
.hist-filter { display: flex; gap: 6px; margin-bottom: 16px; }

@media (max-width: 640px) {
  .container { padding: 12px; }
  header h1 { font-size: 1.05rem; }
  .stats { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-top">
      <h1>Obab SOP</h1>
      <div class="header-right">
        <div class="header-meta">빌드 2026-04-24 12:40</div>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="테마 전환" title="라이트/다크 전환">
          <span id="theme-icon">&#127769;</span>
        </button>
      </div>
    </div>
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="checklist">체크리스트</button>
      <button class="mode-tab" data-mode="history">제출 이력</button>
      <button class="mode-tab" data-mode="wiki">SOP 위키</button>
    </div>
  </div>
</header>

<!-- ═══ CHECKLIST PAGE ═══ -->
<div class="container page active" id="page-checklist">
  <div class="cl-header">
    <div class="cl-date" id="cl-date"></div>
    <div class="cl-name-bar">
      <input type="text" class="cl-name-input" id="cl-name" placeholder="이름을 입력하세요" autocomplete="off">
    </div>
    <div class="cl-role-selector">
      <button class="cl-role-btn active" data-role="lead_manager">리드매니저</button>
      <button class="cl-role-btn" data-role="manager">매니저</button>
    </div>
  </div>

  <div id="cl-submitted-banner"></div>

  <div class="cl-cycle-bar" id="cl-cycle-bar">
    <button class="cl-cycle-btn active" data-cycle="매일">매일</button>
    <button class="cl-cycle-btn" data-cycle="수시">+수시</button>
    <button class="cl-cycle-btn" data-cycle="all">전체</button>
  </div>

  <div class="cl-progress">
    <div class="cl-progress-text">
      <span class="done" id="cl-done">0</span>
      <span class="total" id="cl-total">/ 0 완료</span>
    </div>
    <div class="cl-progress-bar">
      <div class="cl-progress-fill" id="cl-bar" style="width:0%"></div>
    </div>
  </div>

  <div id="cl-list"></div>

  <div class="cl-complete" id="cl-complete">
    <div class="icon">&#127881;</div>
    <div class="msg">오늘 업무 모두 완료!</div>
  </div>

  <div class="cl-footer">
    <button class="cl-submit-btn" id="cl-submit">체크리스트 제출</button>
    <div style="display:flex;gap:8px;justify-content:center;">
      <button class="cl-share-btn" id="cl-share">공유 복사</button>
      <button class="cl-reset-btn" id="cl-reset">초기화</button>
    </div>
  </div>
</div>

<!-- ═══ HISTORY PAGE ═══ -->
<div class="container page" id="page-history">
  <div class="hist-filter" id="hist-filter">
    <button class="filter-btn active" data-hf="all">전체</button>
    <button class="filter-btn" data-hf="lead_manager">리드매니저</button>
    <button class="filter-btn" data-hf="manager">매니저</button>
  </div>
  <div id="hist-list"></div>
</div>

<!-- ═══ WIKI PAGE ═══ -->
<div class="container page" id="page-wiki">
  <div class="search-box">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="search" placeholder="업무명, 역할(매니저), 키워드(pos, 마감) 또는 이름으로 검색..." autocomplete="off">
    <div class="search-hint">예: &nbsp; 마감 &nbsp;|&nbsp; manager &nbsp;|&nbsp; 식자재 &nbsp;|&nbsp; 주류발주 &nbsp;|&nbsp; <strong>홀공통</strong></div>
  </div>

  <div class="filters" id="tag-filters">
    <span style="font-size:0.75rem;color:var(--text-muted);padding:6px 0;">태그:</span>
    <button class="filter-btn tag-btn" data-tag="홀공통">홀공통</button>
    <button class="filter-btn tag-btn" data-tag="오픈">오픈</button>
    <button class="filter-btn tag-btn" data-tag="마감">마감</button>
    <button class="filter-btn tag-btn" data-tag="발주">발주</button>
    <button class="filter-btn tag-btn" data-tag="청소">청소</button>
    <button class="filter-btn tag-btn" data-tag="장부">장부</button>
  </div>

  <div class="filters" id="role-filters">

    h += `<div class="cat-header">${esc(cat)}</div>`;
    for (const [sub, tasks] of Object.entries(subs)) {
      h += `<div class="sub-header">${esc(sub)}</div>`;
      for (const t of tasks) {
        const rolesH = t["역할"].map(r => `<span class="role-tag ${r}">${ROLES[r]?ROLES[r].name:r}</span>`).join("");
        const staffH = t["역할"].map(r => (roleStaff[r]||[]).map(p => `<span class="staff-name">${esc(p.name)}</span>`).join("")).join("");
        const refH = t["참고정보"] ? `<h4>참고정보</h4><div class="ref">${esc(t["참고정보"])}</div>` : "";
        h += `<div class="task-card" onclick="this.classList.toggle('expanded')">
          <div class="task-top"><span class="task-id">${t.id}</span><span class="task-name">${esc(t["업무명"])}</span><span class="task-cycle">${esc(t["주기"])}</span></div>
          <div class="task-roles">${rolesH}</div>
          <div class="task-detail"><h4>수행요령</h4><p>${esc(t["수행요령"])}</p>${refH}${staffH?`<h4>담당 인원</h4>${staffH}`:""}</div>
        </div>`;
      }
    }
  }
  list.innerHTML = h;
}

function applyWikiFilters() {
  let filtered = [...TASKS];
  let searchRoles = [];
  if (wikiSearch) {
    const q = wikiSearch.toLowerCase();
    for (const [name, roles] of Object.entries(nameToRoles))
      if (name.includes(q)) searchRoles.push(...roles);
  }
  if (wikiRole !== "all") filtered = filtered.filter(t => t["역할"].includes(wikiRole));
  if (wikiCycle !== "all") filtered = filtered.filter(t => t["주기"].includes(wikiCycle));
  if (wikiSearch) {
    const q = wikiSearch.toLowerCase();
    filtered = filtered.filter(t => {
      if (searchRoles.length && t["역할"].some(r => searchRoles.includes(r))) return true;
      return t["업무명"].toLowerCase().includes(q) || t["대분류"].toLowerCase().includes(q)
        || t["소분류"].toLowerCase().includes(q) || t["수행요령"].toLowerCase().includes(q)
        || t["참고정보"].toLowerCase().includes(q) || t["키워드"].some(k => k.toLowerCase().includes(q))
        || t["역할"].some(r => r.toLowerCase().includes(q) || (ROLES[r] && ROLES[r].name.includes(q)))
        || t.id.toLowerCase().includes(q);
    });
  }
  renderStats(filtered);
  renderTasks(filtered);
}

// ══════════════════════════════════════════
// CHECKLIST MODE
// ══════════════════════════════════════════
const WEEKDAYS = ["일", "월", "화", "수", "목", "금", "토"];
const today = new Date();
const todayStr = today.toISOString().slice(0, 10);
const dayOfWeek = WEEKDAYS[today.getDay()];
document.getElementById("cl-date").innerHTML =
  `${todayStr} <span class="weekday">(${dayOfWeek})</span>`;

let clRole = "lead_manager";
let clCycleMode = "매일";

function storageKey(taskId) { return `obab-sop-${todayStr}-${taskId}`; }
function isChecked(taskId) { return localStorage.getItem(storageKey(taskId)) === "1"; }
function toggleCheck(taskId) {
  const key = storageKey(taskId);
  if (localStorage.getItem(key) === "1") localStorage.removeItem(key);
  else localStorage.setItem(key, "1");
  renderChecklist();
}

function getFilteredCL() {
  let filtered = TASKS.filter(t => t["역할"].includes(clRole));
  if (clCycleMode === "매일") filtered = filtered.filter(t => t["주기"] === "매일");
  else if (clCycleMode === "수시") filtered = filtered.filter(t => t["주기"] === "매일" || t["주기"] === "수시");
  return filtered;
}

const CAT_ORDER = ["매장오픈", "영업중_고객응대", "마감", "발주관리", "재고관리", "정산_장부", "위생_청소", "인사_스케줄", "시설관리", "관리_검토"];

function renderChecklist() {
  const filtered = getFilteredCL();
  const doneCount = filtered.filter(t => isChecked(t.id)).length;
  const total = filtered.length;
  const pct = total ? Math.round(doneCount / total * 100) : 0;

  document.getElementById("cl-done").textContent = doneCount;
  document.getElementById("cl-total").textContent = `/ ${total} 완료 (${pct}%)`;
  document.getElementById("cl-bar").style.width = pct + "%";

  const completeBanner = document.getElementById("cl-complete");
  if (total > 0 && doneCount === total) completeBanner.classList.add("show");
  else completeBanner.classList.remove("show");

  const groups = {};
  filtered.forEach(t => {
    const cat = t["대분류"];
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(t);
  });

  const listEl = document.getElementById("cl-list");
  let h = "";

  // 카테고리 순서대로, 미완료 먼저
  const catKeys = Object.keys(groups).sort((a, b) => {
    const ai = CAT_ORDER.indexOf(a), bi = CAT_ORDER.indexOf(b);
    return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
  });

  for (const cat of catKeys) {
    const unchecked = groups[cat].filter(t => !isChecked(t.id));
    const checked = groups[cat].filter(t => isChecked(t.id));
    const all = [...unchecked, ...checked];
    if (!all.length) continue;

    h += `<div class="cl-section"><div class="cl-section-title">${esc(cat)} (${all.length - checked.length}/${all.length})</div>`;
    for (const t of all) {
      const done = isChecked(t.id);
      h += `<div class="cl-item ${done ? "checked" : ""}" data-id="${t.id}">
        <div class="cl-checkbox" onclick="event.stopPropagation();toggleCheck('${t.id}')"></div>
        <div class="cl-item-body" onclick="this.querySelector('.cl-item-detail').classList.toggle('open');
             const btn=this.querySelector('.cl-expand-btn');
             btn.textContent=btn.textContent==='상세보기'?'접기':'상세보기';">
          <div class="cl-item-top">
            <span class="cl-item-name">${esc(t["업무명"])}</span>
            <span class="cl-item-id">${t.id}</span>
          </div>
          <span class="cl-expand-btn">상세보기</span>
          <div class="cl-item-detail">
            <p>${esc(t["수행요령"])}</p>
            ${t["참고정보"] ? `<p style="margin-top:6px;color:var(--primary);font-weight:500">${esc(t["참고정보"])}</p>` : ""}
          </div>
        </div>
      </div>`;
    }
    h += `</div>`;
  }

  if (!total) h = '<div class="no-results">해당 역할의 업무가 없습니다.</div>';
  listEl.innerHTML = h;
}

document.querySelectorAll(".cl-role-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".cl-role-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active"); clRole = btn.dataset.role; renderChecklist(); checkSubmitted();
  });
});
document.querySelectorAll(".cl-cycle-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".cl-cycle-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active"); clCycleMode = btn.dataset.cycle; renderChecklist();
  });
});
document.getElementById("cl-reset").addEventListener("click", () => {
  if (!confirm("오늘 체크한 항목을 모두 초기화할까요?")) return;
  TASKS.forEach(t => localStorage.removeItem(storageKey(t.id)));
  renderChecklist();
});

renderChecklist();

// NAME PERSISTENCE
// ══════════════════════════════════════════
const nameInput = document.getElementById("cl-name");
const savedName = localStorage.getItem("obab-sop-username") || "";

// ══════════════════════════════════════════
// SUBMIT
// ══════════════════════════════════════════
function getSubmitKey() { return `obab-sop-submit-${todayStr}-${clRole}`; }
function getSubmission() {
  try { return JSON.parse(localStorage.getItem(getSubmitKey())); } catch(e) { return null; }
}
function getAllSubmissions() {
  try { return JSON.parse(localStorage.getItem("obab-sop-submissions") || "[]"); } catch(e) { return []; }
}

function checkSubmitted() {
  const sub = getSubmission();
  const banner = document.getElementById("cl-submitted-banner");
  const submitBtn = document.getElementById("cl-submit");
  if (sub) {
    banner.innerHTML = `<div class="cl-submitted">
      <div class="icon">&#9989;</div>
      <div class="msg">${esc(sub.name)} — ${ROLES[sub.role]?ROLES[sub.role].name:sub.role} 제출 완료</div>
      <div class="time">${sub.timestamp}</div>
    </div>`;
    submitBtn.textContent = "제출 완료";
    submitBtn.disabled = true;
  } else {
    banner.innerHTML = "";
    submitBtn.textContent = "체크리스트 제출";
    submitBtn.disabled = false;
  }
}

document.getElementById("cl-submit").addEventListener("click", () => {
  const name = nameInput.value.trim();
  if (!name) { alert("이름을 입력해주세요."); nameInput.focus(); return; }

  const filtered = getFilteredCL();
  const doneIds = filtered.filter(t => isChecked(t.id)).map(t => t.id);
  const missedIds = filtered.filter(t => !isChecked(t.id)).map(t => t.id);
  const total = filtered.length;
  const doneCount = doneIds.length;

  if (doneCount === 0) { alert("최소 1개 이상 체크 후 제출해주세요."); return; }
  if (!confirm(`${name} (${ROLES[clRole]?ROLES[clRole].name:clRole})
${doneCount}/${total} 완료 — 제출할까요?`)) return;

  const now = new Date();
  const timestamp = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")} ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;

  const submission = {
    date: todayStr,
    role: clRole,
    name: name,
    timestamp: timestamp,
    doneCount: doneCount,
    total: total,
    doneIds: doneIds,
    missedIds: missedIds
  };

  // Save locally
  localStorage.setItem(getSubmitKey(), JSON.stringify(submission));
  const all = getAllSubmissions();
  const idx = all.findIndex(s => s.date === todayStr && s.role === clRole);
  if (idx !== -1) all.splice(idx, 1);
  all.unshift(submission);
  if (all.length > 90) all.length = 90;
  localStorage.setItem("obab-sop-submissions", JSON.stringify(all));

  // POST to Google Sheets
  if (SHEETS_URL) {
    fetch(SHEETS_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(submission)
    }).catch(() => {});
  }

  checkSubmitted();
  renderChecklist();
  renderHistory();
});

checkSubmitted();

// ══════════════════════════════════════════
// SHARE (COPY TO CLIPBOARD)
// ══════════════════════════════════════════
document.getElementById("cl-share").addEventListener("click", () => {
  const name = nameInput.value.trim() || "(이름없음)";
  const filtered = getFilteredCL();
  const doneIds = filtered.filter(t => isChecked(t.id));
  const missedIds = filtered.filter(t => !isChecked(t.id));
  const roleName = ROLES[clRole] ? ROLES[clRole].name : clRole;

  let text = `[Obab SOP] ${todayStr} (${dayOfWeek})
`;
  text += `${name} / ${roleName}
`;
  text += `완료: ${doneIds.length}/${filtered.length} (${filtered.length ? Math.round(doneIds.length/filtered.length*100) : 0}%)
`;
  text += `──────────
`;
  if (doneIds.length) {
    text += `✅ 완료:
`;
    doneIds.forEach(t => { text += `  ${t.id} ${t["업무명"]}
`; });
  }
  if (missedIds.length) {
    text += `⬜ 미완료:
`;
    missedIds.forEach(t => { text += `  ${t.id} ${t["업무명"]}
`; });
  }

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => alert("클립보드에 복사되었습니다."));
  } else {
    // fallback
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta);
    alert("클립보드에 복사되었습니다.");
  }
});

// ══════════════════════════════════════════
// HISTORY PAGE
// ══════════════════════════════════════════
let histFilter = "all";

function renderHistory() {
  const all = getAllSubmissions();
  const filtered = histFilter === "all" ? all : all.filter(s => s.role === histFilter);
  const listEl = document.getElementById("hist-list");

  if (!filtered.length) {
    listEl.innerHTML = '<div class="hist-empty">제출 이력이 없습니다.</div>';
    return;
  }

  let h = "";
  for (const s of filtered) {
    const pct = s.total ? Math.round(s.doneCount / s.total * 100) : 0;
    const roleName = ROLES[s.role] ? ROLES[s.role].name : s.role;
    const missedList = (s.missedIds || []).map(id => {
      const t = TASKS.find(t => t.id === id);
      return t ? `${id} ${t["업무명"]}` : id;
    });
    const doneList = (s.doneIds || []).map(id => {
      const t = TASKS.find(t => t.id === id);
      return t ? `${id} ${t["업무명"]}` : id;
    });

    h += `<div class="hist-card">
      <div class="hist-top">
        <span class="hist-date">${esc(s.date)}</span>
        <span class="hist-role ${s.role}">${esc(roleName)}</span>
      </div>
      <div class="hist-meta">
        <span>${esc(s.name)} &middot; ${esc(s.timestamp)}</span>
        <button class="hist-delete" onclick="deleteSubmission('${s.date}','${s.role}')">삭제</button>
      </div>
      <div class="hist-progress"><div class="hist-progress-fill" style="width:${pct}%"></div></div>
      <div class="hist-tasks">
        <span class="done">✅ ${s.doneCount}개 완료</span> &middot;
        <span class="${s.missedIds && s.missedIds.length ? 'missed' : ''}">${s.total - s.doneCount}개 미완료</span>
        &middot; ${pct}%
      </div>
      ${missedList.length ? `<details style="margin-top:8px"><summary style="font-size:0.78rem;color:var(--text-muted);cursor:pointer">미완료 항목 (${missedList.length})</summary><div style="font-size:0.75rem;color:var(--danger);margin-top:4px;white-space:pre-line">${missedList.map(esc).join("\n")}</div></details>` : ""}
    </div>`;
  }
  listEl.innerHTML = h;
}

function deleteSubmission(date, role) {
  if (!confirm("이 제출 이력을 삭제할까요?")) return;
  const all = getAllSubmissions();
  const idx = all.findIndex(s => s.date === date && s.role === role);
  if (idx !== -1) all.splice(idx, 1);
  localStorage.setItem("obab-sop-submissions", JSON.stringify(all));
  localStorage.removeItem(`obab-sop-submit-${date}-${role}`);
  renderHistory();
  checkSubmitted();
}

document.querySelectorAll("#hist-filter .filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#hist-filter .filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    histFilter = btn.dataset.hf;
    renderHistory();
  });
});

renderHistory();

// ══════════════════════════════════════════
// THEME TOGGLE
// ══════════════════════════════════════════
(function() {
  const root = document.documentElement;
  const btn = document.getElementById("theme-toggle");
  const icon = document.getElementById("theme-icon");
  const SUN = "☀️", MOON = "🌙"; // ☀️, 🌙

  function currentTheme() {
    const attr = root.getAttribute("data-theme");
    if (attr === "dark" || attr === "light") return attr;
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  }
  function syncIcon() { icon.textContent = currentTheme() === "dark" ? SUN : MOON; }

  syncIcon();
  btn.addEventListener("click", () => {
    const next = currentTheme() === "dark" ? "light" : "dark";
    root.setAttribute("data-theme", next);
    try { localStorage.setItem("obab-sop-theme", next); } catch (e) {}
    syncIcon();
  });

  if (window.matchMedia) {
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
      if (!root.getAttribute("data-theme")) syncIcon();
    });
  }
})();
</script>
