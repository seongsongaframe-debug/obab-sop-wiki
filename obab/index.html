<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의밥상 매장운영 SOP</title>
<style>
:root {
  --bg: #fafafa; --card: #fff; --border: #e0e0e0;
  --primary: #2563eb; --primary-light: #dbeafe;
  --text: #1a1a1a; --text-muted: #6b7280;
  --tag-chef: #dc2626; --tag-ceo: #7c3aed;
  --tag-admin: #2563eb; --tag-lead_manager: #0d9488;
  --tag-manager: #059669; --tag-part: #d97706; --tag-kitchen: #be185d;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       background: var(--bg); color: var(--text); line-height: 1.6; }
.container { max-width: 1200px; margin: 0 auto; padding: 16px; }
header { background: var(--primary); color: #fff; padding: 24px 0; margin-bottom: 24px; }
header .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
header h1 { font-size: 1.5rem; }
header .meta { font-size: 0.85rem; opacity: 0.85; }
header .brand-link { color: #dbeafe; text-decoration: none; font-size: 0.85rem;
                     border: 1px solid rgba(255,255,255,0.4); padding: 4px 12px; border-radius: 16px; }
header .brand-link:hover { background: rgba(255,255,255,0.15); }

/* 검색 */
.search-box { position: relative; margin-bottom: 20px; }
#search { width: 100%; padding: 14px 16px 14px 44px; font-size: 1rem;
           border: 2px solid var(--border); border-radius: 10px;
           outline: none; transition: border-color .2s; }
#search:focus { border-color: var(--primary); }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
               color: var(--text-muted); font-size: 1.2rem; }
.search-hint { font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; }

/* 필터 */
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.filter-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px;
              background: var(--card); cursor: pointer; font-size: 0.85rem;
              transition: all .2s; }
.filter-btn:hover, .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.tag-btn { border-color: #f59e0b; color: #92400e; }
.tag-btn:hover, .tag-btn.active { background: #f59e0b; color: #fff; border-color: #f59e0b; }

/* 통계 */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
         gap: 12px; margin-bottom: 24px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
             padding: 12px; text-align: center; }
.stat-card .num { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
.stat-card .label { font-size: 0.8rem; color: var(--text-muted); }

/* 태스크 카드 */
.task-list { display: flex; flex-direction: column; gap: 8px; }
.cat-header { font-size: 1.1rem; font-weight: 700; margin: 20px 0 8px;
              padding: 8px 12px; background: var(--primary-light); border-radius: 6px; }
.sub-header { font-size: 0.9rem; font-weight: 600; color: var(--text-muted);
              margin: 12px 0 4px; padding-left: 12px; border-left: 3px solid var(--primary); }
.task-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
             padding: 14px; cursor: pointer; transition: box-shadow .2s; }
.task-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.task-card.expanded .task-detail { display: block; }
.task-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.task-id { font-family: monospace; font-size: 0.75rem; color: var(--text-muted);
           background: #f3f4f6; padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
.task-name { font-weight: 600; flex: 1; }
.task-cycle { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; }
.task-roles { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.role-tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 12px; color: #fff; font-weight: 500; }
.role-tag.chef { background: var(--tag-chef); }
.role-tag.ceo { background: var(--tag-ceo); }
.role-tag.admin { background: var(--tag-admin); }
.role-tag.lead_manager { background: var(--tag-lead_manager); }
.role-tag.manager { background: var(--tag-manager); }
.role-tag.part { background: var(--tag-part); }
.role-tag.kitchen { background: var(--tag-kitchen); }
.task-detail { display: none; margin-top: 12px; padding-top: 12px;
               border-top: 1px solid var(--border); }
.task-detail h4 { font-size: 0.85rem; color: var(--text-muted); margin: 8px 0 4px; }
.task-detail p, .task-detail .ref { font-size: 0.9rem; white-space: pre-wrap; }
.task-detail .ref { background: #f9fafb; padding: 8px; border-radius: 6px;
                    font-size: 0.8rem; color: var(--text-muted); }
.task-detail .staff-list { margin-top: 4px; }
.task-detail .staff-name { display: inline-block; background: #f3f4f6; padding: 2px 8px;
                           border-radius: 4px; font-size: 0.8rem; margin: 2px; }

/* 결과 없음 */
.no-results { text-align: center; padding: 40px; color: var(--text-muted); }
.result-count { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px; }

/* 모바일 */
@media (max-width: 640px) {
  .container { padding: 10px; }
  header h1 { font-size: 1.2rem; }
  .stats { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<header>
  <div class="container">
    <div>
      <h1>오늘의밥상 매장운영 SOP</h1>
      <div class="meta">Standard Operating Procedures Wiki</div>
    </div>
    <div style="display:flex;gap:12px;align-items:center;">
      <a class="brand-link" href="../odo/">오도 SOP →</a>
      <div class="meta">빌드: 2026-04-16 11:24</div>
    </div>
  </div>
</header>

<div class="container">

  <!-- 검색 -->
  <div class="search-box">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="search" placeholder="업무명, 역할(매니저), 키워드(pos, 마감) 또는 이름으로 검색..."
           autocomplete="off">
    <div class="search-hint">예: &nbsp; 마감 &nbsp;|&nbsp; manager &nbsp;|&nbsp; 식자재 &nbsp;|&nbsp; 주류발주 &nbsp;|&nbsp; 비품 &nbsp;|&nbsp; <strong>홀공통</strong></div>
  </div>

  <!-- 태그 바로가기 -->
  <div class="filters" id="tag-filters">
    <span style="font-size:0.8rem;color:var(--text-muted);padding:6px 0;">태그:</span>
    <button class="filter-btn tag-btn" data-tag="홀공통">홀공통</button>
    <button class="filter-btn tag-btn" data-tag="오픈">오픈</button>
    <button class="filter-btn tag-btn" data-tag="마감">마감</button>
    <button class="filter-btn tag-btn" data-tag="발주">발주</button>
    <button class="filter-btn tag-btn" data-tag="청소">청소</button>
    <button class="filter-btn tag-btn" data-tag="장부">장부</button>
  </div>

  <!-- 역할 필터 -->
  <div class="filters" id="role-filters">
    <button class="filter-btn active" data-role="all">전체</button>
  </div>

  <!-- 주기 필터 -->
  <div class="filters" id="cycle-filters">
    <button class="filter-btn active" data-cycle="all">전체 주기</button>
    <button class="filter-btn" data-cycle="매일">매일</button>
    <button class="filter-btn" data-cycle="수시">수시</button>
    <button class="filter-btn" data-cycle="주간">주간</button>
    <button class="filter-btn" data-cycle="월간">월간</button>
  </div>

  <!-- 통계 -->
  <div class="stats" id="stats"></div>

  <!-- 결과 카운트 -->
  <div class="result-count" id="result-count"></div>

  <!-- 태스크 리스트 -->
  <div class="task-list" id="task-list"></div>

</div>

<script>

// 상태
let currentRole = "all";
let currentCycle = "all";
let currentSearch = "";

// 통계 렌더
function renderStats(filtered) {
  const stats = document.getElementById("stats");
  const total = filtered.length;
  const byCat = {};
  filtered.forEach(t => { byCat[t["대분류"]] = (byCat[t["대분류"]] || 0) + 1; });
  let html = `<div class="stat-card"><div class="num">${total}</div><div class="label">총 항목</div></div>`;
  for (const [cat, cnt] of Object.entries(byCat)) {
    html += `<div class="stat-card"><div class="num">${cnt}</div><div class="label">${cat}</div></div>`;
  }
  stats.innerHTML = html;
}

// 태스크 카드 렌더
function renderTasks(filtered) {
  const list = document.getElementById("task-list");
  const countEl = document.getElementById("result-count");

  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">검색 결과가 없습니다.</div>';
    countEl.textContent = "";
    return;
  }

  countEl.textContent = `${filtered.length}개 항목`;

  // 대분류 > 소분류 그룹핑
  const groups = {};
  filtered.forEach(t => {
    const cat = t["대분류"];
    const sub = t["소분류"];
    if (!groups[cat]) groups[cat] = {};
    if (!groups[cat][sub]) groups[cat][sub] = [];
    groups[cat][sub].push(t);
  });

  let html = "";
  for (const [cat, subs] of Object.entries(groups)) {
    html += `<div class="cat-header">${esc(cat)}</div>`;
    for (const [sub, tasks] of Object.entries(subs)) {
      html += `<div class="sub-header">${esc(sub)}</div>`;
      for (const t of tasks) {
        const rolesHtml = t["역할"].map(r =>
          `<span class="role-tag ${r}">${ROLES[r] ? ROLES[r].name : r}</span>`
        ).join("");
        const staffHtml = t["역할"].map(r => {
          const people = roleStaff[r] || [];
          return people.map(p => `<span class="staff-name">${esc(p.name)}</span>`).join("");
        }).join("");
        const refHtml = t["참고정보"] ? `<h4>참고정보</h4><div class="ref">${esc(t["참고정보"])}</div>` : "";
        html += `
          <div class="task-card" onclick="this.classList.toggle('expanded')">
            <div class="task-top">
              <span class="task-id">${t.id}</span>
              <span class="task-name">${esc(t["업무명"])}</span>
              <span class="task-cycle">${esc(t["주기"])}</span>
            </div>
            <div class="task-roles">${rolesHtml}</div>
            <div class="task-detail">
              <h4>수행요령</h4>
              <p>${esc(t["수행요령"])}</p>
              ${refHtml}
              ${staffHtml ? `<h4>담당 인원</h4><div class="staff-list">${staffHtml}</div>` : ""}
            </div>
          </div>`;
      }
    }
  }
  list.innerHTML = html;
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// 필터링 로직
function applyFilters() {
  let filtered = [...TASKS];

  // 이름 검색 → 역할 변환
  let searchRoles = [];
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    // 이름으로 역할 찾기
    for (const [name, roles] of Object.entries(nameToRoles)) {
      if (name.includes(q)) searchRoles.push(...roles);
    }
  }

  // 역할 필터
  if (currentRole !== "all") {
    filtered = filtered.filter(t => t["역할"].includes(currentRole));
  }

  // 주기 필터
  if (currentCycle !== "all") {
    filtered = filtered.filter(t => t["주기"].includes(currentCycle));
  }

  // 텍스트 검색
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(t => {
      // 이름 검색 시 해당 역할의 태스크 포함
      if (searchRoles.length > 0 && t["역할"].some(r => searchRoles.includes(r))) return true;
      // 일반 텍스트 검색
      return t["업무명"].toLowerCase().includes(q)
        || t["대분류"].toLowerCase().includes(q)
        || t["소분류"].toLowerCase().includes(q)
        || t["수행요령"].toLowerCase().includes(q)
        || t["참고정보"].toLowerCase().includes(q)
        || t["키워드"].some(k => k.toLowerCase().includes(q))
        || t["역할"].some(r => r.toLowerCase().includes(q))
        || (ROLES[q] && t["역할"].includes(q))
        || t["역할"].some(r => ROLES[r] && ROLES[r].name.includes(q))
        || t.id.toLowerCase().includes(q);
    });
  }

  renderStats(filtered);
  renderTasks(filtered);
}

    document.querySelectorAll("#role-filters .filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentRole = btn.dataset.role;
    applyFilters();
  });
});

    document.querySelectorAll("#cycle-filters .filter-btn").forEach(b => b.classList.remove("active"));

    currentCycle = btn.dataset.cycle;
    applyFilters();
  });
});

// 태그 바로가기 버튼
document.querySelectorAll("#tag-filters .tag-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const tag = btn.dataset.tag;
    const searchEl = document.getElementById("search");
    // 토글: 같은 태그 다시 누르면 해제
    if (searchEl.value === tag) {
      searchEl.value = "";
      btn.classList.remove("active");
    } else {
      document.querySelectorAll("#tag-filters .tag-btn").forEach(b => b.classList.remove("active"));
      searchEl.value = tag;
      btn.classList.add("active");
    }
    currentSearch = searchEl.value.trim();
    applyFilters();
  });
});

document.getElementById("search").addEventListener("input", (e) => {
  currentSearch = e.target.value.trim();
  // 태그 버튼 active 해제
  document.querySelectorAll("#tag-filters .tag-btn").forEach(b => b.classList.remove("active"));
  applyFilters();
});

// 초기 렌더
applyFilters();
